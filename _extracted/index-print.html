<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <title>まちのできごと — 印刷用</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles.css?v=18"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    window.INIT_TWEAKS = { "theme": "kinari" };
    document.documentElement.setAttribute("data-theme", "kinari");
  </script>

  <script src="src/data.js?v=7"></script>
  <script src="src/regions.js"></script>

  <style>
    /* =========================================================
       Print-mode overrides for まちのできごと
       ========================================================= */

    @page {
      size: A4 portrait;
      margin: 14mm 12mm;
    }

    html, body {
      background: #fff !important;
      color: var(--ink) !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* Each rendered route becomes one print "sheet" */
    .print-sheet {
      background: #fff;
      padding: 0 0 36px;
      break-after: page;
      page-break-after: always;
    }
    .print-sheet:last-child {
      break-after: auto;
      page-break-after: auto;
    }

    .print-sheet-label {
      font-family: "Noto Sans JP", sans-serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--ink-mute);
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
      padding: 0 0 8px;
      margin: 0 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .print-sheet-label span:last-child {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--ink-mute);
    }

    /* Hide all interactive/ephemeral chrome */
    .demo-toggle,
    .tweaks-panel,
    .toast,
    .app-foot,
    .app-nav .nav-auth,
    .btn-register,
    .share-actions,
    .fav-btn,
    .nav-scrim { display: none !important; }

    /* App nav becomes a compact masthead */
    .app-nav {
      position: static !important;
      background: #fff !important;
      border-bottom: 1px solid var(--ink) !important;
      padding: 0 0 10px !important;
      margin: 0 0 18px !important;
      box-shadow: none !important;
    }
    .app-nav .nav-inner {
      padding: 0 !important;
      max-width: none !important;
    }

    /* Remove fixed positioning, sticky bars, backdrop filters */
    * {
      position: static !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }

    /* No scrolling; allow content to flow across pages */
    .app, .app-main {
      overflow: visible !important;
      min-height: 0 !important;
      max-width: none !important;
    }

    /* Cards / images */
    img, .event-card, .hero-img, .photo, .photo-tile {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    h1, h2, h3 { break-after: avoid; page-break-after: avoid; }

    /* Container */
    #print-root {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 4px;
    }

    /* Subtle print footer on each sheet */
    .print-sheet::after {
      content: "まちのできごと  ／  MACHI NO DEKIGOTO";
      display: block;
      margin-top: 24px;
      padding-top: 10px;
      border-top: 1px solid var(--line-soft);
      font-family: "Noto Sans JP", sans-serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--ink-mute);
      text-align: center;
    }

    /* Hide scrollbars that might render as black */
    ::-webkit-scrollbar { display: none; }

    /* Force card backgrounds to print */
    .event-card, .series-card, .organizer-card,
    [class*="card"] {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* Avoid text wrapping too small */
    body { font-size: 12pt; line-height: 1.55; }

    /* Tweaks button etc. */
    button.demo-toggle { display: none !important; }

    @media screen {
      body { background: #e8e2d6; padding: 20px 0; }
      #print-root {
        background: #fff;
        box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        padding: 40px;
      }
    }
  </style>
</head>
<body>
  <div id="print-root"></div>

  <script type="text/babel" src="src/components/regionpicker.jsx"></script>
  <script type="text/babel" src="src/components/shared.jsx"></script>
  <script type="text/babel" src="src/components/top.jsx"></script>
  <script type="text/babel" src="src/components/detail.jsx"></script>
  <script type="text/babel" src="src/components/registration.jsx"></script>
  <script type="text/babel" src="src/components/series.jsx"></script>
  <script type="text/babel" src="src/components/dashboard.jsx"></script>
  <script type="text/babel" src="src/components/mine.jsx"></script>

  <script type="text/babel">
    /*
      Print renderer — renders multiple app views sequentially
      as separate printable sheets.
    */
    function PrintApp() {
      const data = window.APP_DATA;
      const noop = () => {};
      const setView = () => {};
      const favs = { events: [], series: [], organizers: [], toggle: noop };

      // Pick a representative feature event for the detail sheet
      const featured = data.events.find(e => e.id === "soup-jun") || data.events[0];
      const featuredSeries = data.series[0];

      const sheets = [
        {
          label: "TOP  ／  みつける",
          num: "01",
          content: (
            <TopView
              authed={false}
              user={data.user}
              events={data.events}
              series={data.series}
              setView={setView}
              anchor={null}
              regions={data.regions}
              favs={favs}
            />
          ),
        },
        {
          label: "EVENT DETAIL  ／  イベント詳細",
          num: "02",
          content: (
            <EventDetail
              event={featured}
              series={data.series}
              setView={setView}
              onRegister={noop}
              isPast={false}
              onAddReport={noop}
              authed={false}
              isOrganizer={false}
              favs={favs}
            />
          ),
        },
        {
          label: "SERIES  ／  シリーズ詳細",
          num: "03",
          content: (
            <SeriesDetail
              seriesId={featuredSeries.id}
              series={data.series}
              events={data.events}
              pastEvents={data.pastEvents}
              setView={setView}
              favs={favs}
            />
          ),
        },
      ];

      return (
        <div className="app">
          {sheets.map((s, i) => (
            <div className="print-sheet" key={i}>
              <div className="print-sheet-label">
                <span>まちのできごと  ／  {s.label}</span>
                <span>{s.num}</span>
              </div>
              <main className="app-main">{s.content}</main>
            </div>
          ))}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("print-root")).render(<PrintApp />);

    // Trigger print once fonts + Babel + React commit are done.
    window.__AUTO_PRINT__ = !location.search.includes("noprint");
    (async () => {
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e) {}
      // Give React a tick to commit, images a moment to decode
      await new Promise(r => setTimeout(r, 800));
      // Decode all images we can
      await Promise.all([...document.images].map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(res => { img.onload = img.onerror = res; });
      })).catch(() => {});
      await new Promise(r => setTimeout(r, 300));
      if (window.__AUTO_PRINT__) window.print();
    })();
  </script>
</body>
</html>
