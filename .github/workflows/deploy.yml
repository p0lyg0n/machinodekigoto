name: Deploy prototype to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Pages 設定（未有効なら自動で有効化）
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: アーティファクトをアップロード（_extracted を公開対象に）
        uses: actions/upload-pages-artifact@v3
        with:
          path: _extracted

      - name: Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
